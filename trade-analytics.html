<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VWAP Rotation — Trade Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e17;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .header p { color: #64748b; font-size: 14px; }
        .header .live-dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; background: #22c55e;
            animation: pulse 2s infinite; margin-right: 6px;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Summary Cards */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .card {
            background: linear-gradient(145deg, #131a2b, #0f1525);
            border: 1px solid #1e293b;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-2px); }
        .card .label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .card .value { font-size: 28px; font-weight: 800; }
        .card .sub { font-size: 12px; color: #64748b; margin-top: 4px; }
        .green { color: #22c55e; }
        .red { color: #ef4444; }
        .blue { color: #60a5fa; }
        .purple { color: #a78bfa; }
        .yellow { color: #eab308; }

        /* Section titles */
        .section-title {
            font-size: 18px; font-weight: 700;
            margin: 28px 0 14px;
            display: flex; align-items: center; gap: 8px;
        }

        /* Daily PnL */
        .daily-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 24px;
        }
        .daily-card {
            background: #131a2b;
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }
        .daily-card .day { font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 4px; }
        .daily-card .pnl { font-size: 22px; font-weight: 800; }
        .daily-card .trades { font-size: 11px; color: #64748b; margin-top: 2px; }

        /* Active Positions */
        .active-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .active-card {
            background: linear-gradient(145deg, #0c1a2e, #0f1525);
            border: 1px solid #1e40af33;
            border-radius: 12px;
            padding: 16px;
        }
        .active-card .sym { font-size: 16px; font-weight: 700; color: #60a5fa; }
        .active-card .info { font-size: 12px; color: #64748b; margin-top: 6px; line-height: 1.8; }
        .active-card .info span { color: #e2e8f0; font-weight: 600; }

        /* Trade Table */
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #1e293b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12.5px;
        }
        thead th {
            background: #131a2b;
            padding: 12px 10px;
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            font-weight: 600;
            position: sticky;
            top: 0;
            cursor: pointer;
            user-select: none;
        }
        thead th:hover { color: #94a3b8; }
        tbody tr {
            border-bottom: 1px solid #1e293b11;
            transition: background 0.15s;
        }
        tbody tr:hover { background: #1e293b44; }
        tbody td {
            padding: 10px;
            white-space: nowrap;
        }
        .pnl-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 12px;
        }
        .pnl-badge.win { background: #22c55e22; color: #22c55e; }
        .pnl-badge.loss { background: #ef444422; color: #ef4444; }
        .pnl-badge.neutral { background: #64748b22; color: #64748b; }
        .reason-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 11px;
            background: #1e293b;
            color: #94a3b8;
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Filters */
        .filters {
            display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .filters select, .filters input {
            background: #131a2b;
            border: 1px solid #1e293b;
            border-radius: 8px;
            color: #e2e8f0;
            padding: 8px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
        }
        .filters select:focus, .filters input:focus {
            outline: none; border-color: #60a5fa;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .refresh-btn:hover { opacity: 0.85; }

        .loader { text-align: center; padding: 40px; color: #64748b; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛰️ VWAP Rotation — Trade Analytics</h1>
        <p><span class="live-dot"></span>Live Data from Bot | <span id="lastUpdate">Loading...</span></p>
    </div>

    <!-- Summary Cards -->
    <div class="cards" id="summaryCards">
        <div class="loader">Loading data...</div>
    </div>

    <!-- Daily PnL -->
    <div class="section-title">📅 PnL par Jour</div>
    <div class="daily-grid" id="dailyPnl"></div>

    <!-- Active Positions -->
    <div class="section-title">📍 Positions Actives (Live)</div>
    <div class="active-grid" id="activePositions"></div>

    <!-- Trade History -->
    <div class="section-title">📊 Historique des Trades</div>
    <div class="filters">
        <select id="filterStatus">
            <option value="all">All Status</option>
            <option value="closed">Closed</option>
            <option value="active">Active</option>
        </select>
        <select id="filterResult">
            <option value="all">All Results</option>
            <option value="win">Winners</option>
            <option value="loss">Losers</option>
        </select>
        <input type="text" id="filterSymbol" placeholder="🔍 Search token..." />
        <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
    </div>
    <div class="table-container" id="tradeTable"></div>

    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://187.124.33.159:3001/api/hunts'
            : `http://${window.location.hostname}:3001/api/hunts`;

        let allTrades = [];

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                allTrades = await res.json();
                renderAll();
                document.getElementById('lastUpdate').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                document.getElementById('summaryCards').innerHTML = `<div class="loader">❌ Error: ${e.message}<br>Make sure bot is running.</div>`;
            }
        }

        function renderAll() {
            renderSummary();
            renderDailyPnl();
            renderActivePositions();
            renderTable();
        }

        function renderSummary() {
            const closed = allTrades.filter(t => t.status === 'closed');
            const active = allTrades.filter(t => t.status === 'active');
            const totalPnl = closed.reduce((s, t) => s + (t.pnl || 0), 0);
            const wins = closed.filter(t => (t.pnl || 0) > 0).length;
            const losses = closed.filter(t => (t.pnl || 0) < 0).length;
            const winRate = closed.length > 0 ? ((wins / closed.length) * 100).toFixed(0) : 0;

            const activePnl = active.reduce((s, t) => {
                const cur = t.currentPrice || t.entryPrice;
                return s + ((cur - t.entryPrice) / t.entryPrice * 100);
            }, 0);

            const bestTrade = closed.reduce((best, t) => (t.pnl || 0) > (best.pnl || 0) ? t : best, { pnl: 0 });
            const worstTrade = closed.reduce((worst, t) => (t.pnl || 0) < (worst.pnl || 0) ? t : worst, { pnl: 0 });

            document.getElementById('summaryCards').innerHTML = `
                <div class="card">
                    <div class="label">Total PnL (All Time)</div>
                    <div class="value ${totalPnl >= 0 ? 'green' : 'red'}">${totalPnl >= 0 ? '+' : ''}${totalPnl.toFixed(2)}%</div>
                    <div class="sub">${closed.length} trades closed</div>
                </div>
                <div class="card">
                    <div class="label">Active PnL (Now)</div>
                    <div class="value ${activePnl >= 0 ? 'green' : 'red'}">${activePnl >= 0 ? '+' : ''}${activePnl.toFixed(2)}%</div>
                    <div class="sub">${active.length} positions open</div>
                </div>
                <div class="card">
                    <div class="label">Win Rate</div>
                    <div class="value blue">${winRate}%</div>
                    <div class="sub">${wins}W / ${losses}L</div>
                </div>
                <div class="card">
                    <div class="label">Best Trade</div>
                    <div class="value green">+${(bestTrade.pnl || 0).toFixed(2)}%</div>
                    <div class="sub">${bestTrade.symbol || '-'}</div>
                </div>
                <div class="card">
                    <div class="label">Worst Trade</div>
                    <div class="value red">${(worstTrade.pnl || 0).toFixed(2)}%</div>
                    <div class="sub">${worstTrade.symbol || '-'}</div>
                </div>
                <div class="card">
                    <div class="label">Total Trades</div>
                    <div class="value purple">${allTrades.length}</div>
                    <div class="sub">${active.length} active / ${closed.length} closed</div>
                </div>
            `;
        }

        function renderDailyPnl() {
            const closed = allTrades.filter(t => t.status === 'closed' && t.exitTime);
            const byDay = {};

            closed.forEach(t => {
                const day = t.exitTime.slice(0, 10);
                if (!byDay[day]) byDay[day] = { pnl: 0, count: 0, wins: 0, losses: 0 };
                byDay[day].pnl += (t.pnl || 0);
                byDay[day].count++;
                if ((t.pnl || 0) > 0) byDay[day].wins++;
                else if ((t.pnl || 0) < 0) byDay[day].losses++;
            });

            const days = Object.keys(byDay).sort().reverse();
            document.getElementById('dailyPnl').innerHTML = days.map(day =>
                `<div class="daily-card">
                    <div class="day">${day}</div>
                    <div class="pnl ${byDay[day].pnl >= 0 ? 'green' : 'red'}">${byDay[day].pnl >= 0 ? '+' : ''}${byDay[day].pnl.toFixed(2)}%</div>
                    <div class="trades">${byDay[day].count} trades (${byDay[day].wins}W/${byDay[day].losses}L)</div>
                </div>`
            ).join('');
        }

        function renderActivePositions() {
            const active = allTrades.filter(t => t.status === 'active');
            if (active.length === 0) {
                document.getElementById('activePositions').innerHTML = '<div style="color:#64748b;padding:10px;">No active positions</div>';
                return;
            }

            document.getElementById('activePositions').innerHTML = active.map(t => {
                const cur = t.currentPrice || t.entryPrice;
                const pnl = ((cur - t.entryPrice) / t.entryPrice * 100);
                const since = new Date(t.entryTime).toLocaleString();
                return `<div class="active-card">
                    <div class="sym">${t.symbol}</div>
                    <div style="font-size:20px;font-weight:800;margin-top:8px;" class="${pnl >= 0 ? 'green' : 'red'}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}%</div>
                    <div class="info">
                        Entry: <span>$${t.entryPrice}</span><br>
                        Current: <span>$${cur}</span><br>
                        Since: <span>${since}</span><br>
                        ${t.entryReason ? `Reason: <span>${t.entryReason}</span><br>` : ''}
                        ${t.density !== undefined ? `Density: <span>${t.density}%</span> | ` : ''}RSI: <span>${t.entryRsi || 'N/A'}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function renderTable() {
            const statusFilter = document.getElementById('filterStatus').value;
            const resultFilter = document.getElementById('filterResult').value;
            const symbolFilter = document.getElementById('filterSymbol').value.toUpperCase();

            let filtered = [...allTrades];

            if (statusFilter !== 'all') filtered = filtered.filter(t => t.status === statusFilter);
            if (resultFilter === 'win') filtered = filtered.filter(t => (t.pnl || 0) > 0);
            if (resultFilter === 'loss') filtered = filtered.filter(t => (t.pnl || 0) < 0);
            if (symbolFilter) filtered = filtered.filter(t => t.symbol.includes(symbolFilter));

            filtered.sort((a, b) => new Date(b.entryTime) - new Date(a.entryTime));

            const rows = filtered.map(t => {
                const pnl = t.pnl || 0;
                const pnlClass = pnl > 0 ? 'win' : pnl < 0 ? 'loss' : 'neutral';
                const dur = t.exitTime
                    ? Math.round((new Date(t.exitTime) - new Date(t.entryTime)) / 60000) + 'min'
                    : 'Active';
                return `<tr>
                    <td style="font-weight:600;color:#60a5fa">${t.symbol}</td>
                    <td>${new Date(t.entryTime).toLocaleString()}</td>
                    <td>$${t.entryPrice}</td>
                    <td>${t.exitPrice ? '$' + t.exitPrice : '—'}</td>
                    <td><span class="pnl-badge ${pnlClass}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}%</span></td>
                    <td>${dur}</td>
                    <td>${t.density !== undefined ? t.density + '%' : '—'}</td>
                    <td>${t.entryRsi || '—'}</td>
                    <td>${t.entryDistance || '—'}</td>
                    <td><span class="reason-badge" title="${t.entryReason || 'VWAP Rotation'}">${t.entryReason || 'VWAP Rotation'}</span></td>
                    <td><span class="reason-badge" title="${t.reason || '—'}">${t.reason || (t.status === 'active' ? '⏳ Active' : '—')}</span></td>
                    <td style="color:${t.status === 'active' ? '#22c55e' : '#64748b'};font-weight:600">${t.status}</td>
                </tr>`;
            }).join('');

            document.getElementById('tradeTable').innerHTML = `
                <table>
                    <thead><tr>
                        <th>Symbol</th>
                        <th>Entry Time</th>
                        <th>Entry $</th>
                        <th>Exit $</th>
                        <th>PnL</th>
                        <th>Duration</th>
                        <th>Density</th>
                        <th>RSI</th>
                        <th>Distance</th>
                        <th>Entry Reason</th>
                        <th>Exit Reason</th>
                        <th>Status</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        // Filters
        document.getElementById('filterStatus').addEventListener('change', renderTable);
        document.getElementById('filterResult').addEventListener('change', renderTable);
        document.getElementById('filterSymbol').addEventListener('input', renderTable);

        // Auto-refresh every 30s
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
