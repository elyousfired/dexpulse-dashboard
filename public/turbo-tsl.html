<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Turbo TSL Console — High Frequency VWAP Breakouts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03060c;
            --accent: #f59e0b;
            --accent-glow: rgba(245, 158, 11, 0.4);
            --card-bg: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --turbo-gradient: linear-gradient(135deg, #f59e0b, #ef4444, #8b5cf6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #1e293b 0%, transparent 35%);
            padding: 40px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        .header-left h1 {
            font-size: 40px;
            font-weight: 800;
            background: var(--turbo-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1.5px;
        }

        .header-left p { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
        .live-dot {
            display: inline-block; width: 8px; height: 8px;
            background: var(--success); border-radius: 50%;
            margin-right: 8px; box-shadow: 0 0 10px var(--success);
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr) 1.5fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--border);
        }

        .stat-card.featured::after { background: var(--turbo-gradient); }

        .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-secondary); font-weight: 700; margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }

        /* Sort Bar */
        .sort-bar {
            background: rgba(15, 23, 42, 0.4);
            padding: 12px 20px;
            border-radius: 16px;
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            align-items: center;
        }

        .sort-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sort-btn.active {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-color: var(--accent);
        }

        .sort-btn:hover:not(.active) { background: rgba(255, 255, 255, 0.03); color: #fff; }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .token-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .token-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .token-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .symbol-box h3 { font-size: 24px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
        .symbol-box span { font-size: 10px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }

        .pnl-badge {
            font-size: 20px; font-weight: 900;
            padding: 6px 14px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
        }
        .pnl-badge.positive { color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .pnl-badge.negative { color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .price-label { font-size: 11px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; }
        .price-value { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        .progress-container {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%; border-radius: 3px; transition: width 0.6s;
        }
        .progress-fill.positive { background: linear-gradient(90deg, #10b981, #34d399); }
        .progress-fill.negative { background: linear-gradient(90deg, #ef4444, #f87171); }

        .footer-metrics {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 12px;
        }

        .meta-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
        }
        .meta-label { font-size: 9px; color: var(--text-secondary); font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .meta-val { font-size: 13px; font-weight: 700; color: #e2e8f0; }

        .active-tag {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .loader { text-align: center; padding: 100px; color: var(--text-secondary); font-weight: 600; }
        
        .empty-icon { font-size: 48px; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <h1>🛸 Turbo TSL Console</h1>
                <p><span class="live-dot"></span> VWAP Breakthrough Tracking System | <span id="lastUpdate">Loading...</span></p>
            </div>
            <div class="header-right">
                <button class="refresh-btn" onclick="loadData()" style="
                    background: var(--turbo-gradient);
                    border: none; color: white; padding: 12px 24px;
                    border-radius: 14px; font-weight: 800; font-size: 13px;
                    cursor: pointer; box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
                ">🚀 FORCE REFRESH</button>
            </div>
        </header>

        <section class="stats-grid" id="stats">
            <div class="stat-card">
                <div class="stat-label">Active Slots</div>
                <div class="stat-value" id="stat-active" style="color: var(--success)">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Today PnL</div>
                <div class="stat-value" id="stat-today">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Yesterday PnL</div>
                <div class="stat-value" id="stat-yesterday">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">History (Pre-Yesterday)</div>
                <div class="stat-value" id="stat-history" style="color: var(--accent)">—</div>
            </div>
            <div class="stat-card featured">
                <div class="stat-label">All-Time Realized PnL</div>
                <div class="stat-value" id="stat-total" style="color: var(--success)">—</div>
            </div>
        </section>

        <div class="sort-bar">
            <span style="font-size:11px; font-weight:800; color:var(--text-secondary); text-transform:uppercase; margin-right:10px;">Sort Positions</span>
            <button class="sort-btn active" data-sort="time" onclick="setSort('time')">🕐 Recent</button>
            <button class="sort-btn" data-sort="pnl" onclick="setSort('pnl')">📊 Performance</button>
            <button class="sort-btn" data-sort="active" onclick="setSort('active')">🟢 Active First</button>
        </div>

        <div class="grid" id="grid">
            <div class="loader">
                <span class="empty-icon">🛰️</span>
                Scanning local data layer...
            </div>
        </div>
    </div>

    <script>
        const BASE = `http://${window.location.hostname}:3001`;
        let tslData = [];
        let currentSort = 'time';

        async function loadData() {
            try {
                const res = await fetch(`${BASE}/api/hunts`);
                const allHunts = await res.json();
                tslData = allHunts.filter(h => h.strategyId === 'vwap_tsl');
                
                renderStats();
                renderGrid();
                document.getElementById('lastUpdate').textContent = `Pulse: ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                console.error("Fetch error:", e);
                document.getElementById('grid').innerHTML = `<div class="loader">❌ Server connection failed. Run 'npm run proxy'</div>`;
            }
        }

        function renderStats() {
            const active = tslData.filter(h => h.status === 'active');
            const closed = tslData.filter(h => h.status === 'closed' && h.pnl !== undefined);
            
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const yesterdayStart = new Date(todayStart);
            yesterdayStart.setDate(yesterdayStart.getDate() - 1);
            const yesterdayEnd = new Date(todayStart);
            yesterdayEnd.setMilliseconds(-1);
            const cutoffToday = todayStart;
            const cutoffYesterdayStart = yesterdayStart;
            const cutoffYesterdayEnd = yesterdayEnd;
            const yesterdayTrades = closed.filter(h => {
                const d = new Date(h.exitTime);
                return d >= cutoffYesterdayStart && d <= cutoffYesterdayEnd;
            });

            const todayTrades = closed.filter(h => {
                const d = new Date(h.exitTime);
                return d >= cutoffToday;
            });

            const historyTrades = closed.filter(h => {
                const d = new Date(h.exitTime);
                return d < cutoffYesterdayStart;
            });

            const yesterdayPnl = yesterdayTrades.reduce((s, h) => s + (h.pnl || 0), 0);
            const todayPnl = todayTrades.reduce((s, h) => s + (h.pnl || 0), 0);
            const historyPnl = historyTrades.reduce((s, h) => s + (h.pnl || 0), 0);
            const totalRealizedPnl = historyPnl + yesterdayPnl + todayPnl;

            document.getElementById('stat-active').textContent = active.length;
            
            document.getElementById('stat-today').textContent = `${todayPnl >= 0 ? '+' : ''}${todayPnl.toFixed(2)}%`;
            document.getElementById('stat-today').style.color = todayPnl >= 0 ? 'var(--success)' : 'var(--danger)';

            document.getElementById('stat-yesterday').textContent = `${yesterdayPnl >= 0 ? '+' : ''}${yesterdayPnl.toFixed(2)}%`;
            document.getElementById('stat-yesterday').style.color = yesterdayPnl >= 0 ? 'var(--success)' : 'var(--danger)';
            
            document.getElementById('stat-history').textContent = `${historyPnl >= 0 ? '+' : ''}${historyPnl.toFixed(2)}%`;
            document.getElementById('stat-history').style.color = historyPnl >= 0 ? 'var(--accent)' : 'var(--danger)';
            
            document.getElementById('stat-total').textContent = `${totalRealizedPnl >= 0 ? '+' : ''}${totalRealizedPnl.toFixed(2)}%`;
        }

        function setSort(s) {
            currentSort = s;
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === s));
            renderGrid();
        }

        function renderGrid() {
            let sorted = [...tslData];
            switch (currentSort) {
                case 'time': sorted.sort((a, b) => new Date(b.entryTime) - new Date(a.entryTime)); break;
                case 'pnl': sorted.sort((a, b) => {
                    const ap = a.pnl ?? ((a.currentPrice - a.entryPrice) / a.entryPrice * 100);
                    const bp = b.pnl ?? ((b.currentPrice - b.entryPrice) / b.entryPrice * 100);
                    return bp - ap;
                }); break;
                case 'active': sorted.sort((a, b) => (b.status === 'active' ? 1 : 0) - (a.status === 'active' ? 1 : 0)); break;
            }

            if (sorted.length === 0) {
                document.getElementById('grid').innerHTML = '<div class="loader"><span class="empty-icon">📡</span>Waiting for Turbo scanner to find breakouts...</div>';
                return;
            }

            document.getElementById('grid').innerHTML = sorted.slice(0, 150).map(h => {
                const isActive = h.status === 'active';
                const pnl = h.pnl ?? (h.currentPrice ? ((h.currentPrice - h.entryPrice) / h.entryPrice) * 100 : 0);
                const pnlCls = pnl >= 0 ? 'positive' : 'negative';
                const barW = Math.min(Math.abs(pnl) / 5 * 100, 100);

                return `
                    <div class="token-card">
                        <div class="token-header">
                            <div class="symbol-box">
                                <h3>${h.symbol.replace('USDT', '')}</h3>
                                <span>BINANCE BREAKOUT</span>
                            </div>
                            <div class="pnl-badge ${pnlCls}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}%</div>
                        </div>

                        <div class="info-row">
                            <div>
                                <div class="price-label">${isActive ? 'Current Price' : 'Exit Price'}</div>
                                <div class="price-value" style="color:${pnl >= 0 ? 'var(--success)' : 'var(--danger)'}">$${(h.currentPrice || h.exitPrice || h.entryPrice).toLocaleString()}</div>
                            </div>
                            <div style="text-align: right">
                                <div class="price-label">Entry</div>
                                <div class="price-value">$${h.entryPrice.toLocaleString()}</div>
                            </div>
                        </div>

                        <div class="progress-container">
                            <div class="progress-fill ${pnlCls}" style="width: ${barW}%"></div>
                        </div>

                        <div class="footer-metrics">
                            <div class="meta-item">
                                <div class="meta-label">Status</div>
                                <div class="meta-val">${isActive ? '<span class="active-tag">● LIVE</span>' : '<span style="color:#64748b">CLOSED</span>'}</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">Protection</div>
                                <div class="meta-val">TSL 5-15%</div>
                            </div>
                        </div>
                        
                        ${h.reason ? `
                        <div class="meta-item" style="margin-top:12px; grid-column: 1 / -1; background: rgba(0,0,0,0.2)">
                            <div class="meta-label">Exit Reason</div>
                            <div class="meta-val" style="font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis" title="${h.reason}">${h.reason}</div>
                        </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        loadData();
        setInterval(loadData, 10000);
    </script>
</body>
</html>
