<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Hub V2 — Professional Trading Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #07090f;
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --sniper-gold: #f59e0b;
            --turbo-blue: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(245, 158, 11, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1.1); opacity: 0.8; box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header { 
            padding: 60px 20px 40px; 
            text-align: center;
            background: linear-gradient(to bottom, rgba(7, 9, 15, 1), transparent);
        }
        
        .header h1 { 
            font-size: 42px; 
            font-weight: 800; 
            letter-spacing: -1.5px; 
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
            backdrop-filter: blur(10px);
        }

        .live-dot { 
            height: 8px; width: 8px; 
            background: #22c55e; 
            border-radius: 50%; 
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        /* Container & Tabs */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 40px 60px; }
        
        .tabs { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 40px; 
        }

        .tab { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            color: var(--text-dim);
            padding: 12px 32px; 
            border-radius: 16px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
        }

        .tab:hover { border-color: rgba(255,255,255,0.2); color: #fff; }
        .tab.active { 
            background: #fff; 
            color: #000; 
            border-color: #fff;
            box-shadow: 0 10px 30px rgba(255,255,255,0.15);
        }

        /* Stats Dashboard */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            margin-bottom: 40px; 
        }

        .stat-card { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            padding: 25px; 
            border-radius: 24px; 
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.02), transparent);
            pointer-events: none;
        }

        .stat-label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 10px; }
        .stat-value { font-size: 32px; font-weight: 800; letter-spacing: -1px; }

        /* Progress Bar */
        .progress-container { margin-top: 15px; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--turbo-blue); border-radius: 10px; transition: width 1s ease; }

        /* Token Grid */
        .token-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; 
        }

        .token-card { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            padding: 30px; 
            border-radius: 32px; 
            backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            animation: slideUp 0.6s ease forwards;
        }

        .token-card:hover { 
            transform: translateY(-8px) scale(1.02); 
            border-color: rgba(255,255,255,0.2); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .mode-tag {
            position: absolute;
            top: 25px; right: 25px;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tag-sniper { background: rgba(245, 158, 11, 0.1); color: var(--sniper-gold); border: 1px solid rgba(245, 158, 11, 0.2); }
        .tag-turbo { background: rgba(59, 130, 246, 0.1); color: var(--turbo-blue); border: 1px solid rgba(59, 130, 246, 0.2); }

        .token-header { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; }
        .token-icon { 
            width: 44px; height: 44px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            color: #fff;
        }

        .token-info h3 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
        .token-info p { font-size: 13px; color: var(--text-dim); }

        .token-main { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; }
        .price-current { font-size: 28px; font-weight: 800; }
        .pnl-badge { 
            font-size: 16px; font-weight: 700; 
            padding: 6px 14px; border-radius: 12px;
        }
        .pnl-pos { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .pnl-neg { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        .metrics-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .metric { display: flex; flex-direction: column; gap: 4px; }
        .metric-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }
        .metric-value { font-size: 14px; font-weight: 700; color: #fff; }

        .history-card { opacity: 0.85; filter: grayscale(0.2); }
        .history-card:hover { filter: grayscale(0); opacity: 1; }

        .hidden { display: none; }
        .loader { text-align: center; padding: 100px; color: var(--text-dim); font-size: 18px; font-weight: 500; }

        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .container { padding: 0 20px 40px; }
        }

        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 32px; }
            .tab { padding: 10px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Hybrid Hub V2</h1>
        <div class="status-pill">
            <span class="live-dot"></span>
            Operational Presence • <span id="lastUpdate">Checking Pulse...</span>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab active" data-tab="active">Active Fleet</button>
            <button class="tab" data-tab="history">Mission History</button>
        </div>

        <div id="statsSection" class="stats-grid"></div>

        <div id="activeTab">
            <div id="activeGrid" class="token-grid">
                <div class="loader">Synchronizing Fleet Units...</div>
            </div>
        </div>

        <div id="historyTab" class="hidden">
            <div id="historyGrid" class="token-grid"></div>
        </div>
    </div>

    <script>
        const API_BASE = `http://${window.location.hostname}:3001`;

        // Tab Management
        document.querySelectorAll('.tab').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                document.getElementById('activeTab').classList.toggle('hidden', tab !== 'active');
                document.getElementById('historyTab').classList.toggle('hidden', tab !== 'history');
                document.getElementById('statsSection').style.opacity = tab === 'active' ? '1' : '0.5';
            });
        });

        async function updatePulse() {
            try {
                const response = await fetch(`${API_BASE}/api/hunts`);
                const hunts = await response.json();
                
                const active = hunts.filter(h => h.status === 'active');
                const closed = hunts.filter(h => h.status === 'closed');

                renderStats(active, closed);
                renderActive(active);
                renderHistory(closed);

                document.getElementById('lastUpdate').textContent = `Sync: ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                console.error("Link Disturbance:", e);
                document.getElementById('lastUpdate').textContent = "Connection Lost";
            }
        }

        function renderStats(active, closed) {
            const snipers = active.filter(h => h.mode === 'Sniper').length;
            const turbos = active.filter(h => h.mode !== 'Sniper').length;
            const totalPnL = closed.reduce((acc, h) => acc + (h.pnl || 0), 0);
            const winRate = closed.length > 0 
                ? (closed.filter(h => h.pnl > 0).length / closed.length * 100).toFixed(0) 
                : 0;

            const slotUsage = (active.length / 50) * 100;

            document.getElementById('statsSection').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total Realized PnL</div>
                    <div class="stat-value" style="color: ${totalPnL >= 0 ? 'var(--success)' : 'var(--danger)'}">
                        ${totalPnL >= 0 ? '+' : ''}${totalPnL.toFixed(2)}%
                    </div>
                    <div style="font-size: 12px; color: var(--text-dim); margin-top: 5px;">Aggregate Profit Projection</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Tactical Sniper Units</div>
                    <div class="stat-value" style="color: var(--sniper-gold)">${snipers}/3</div>
                    <div class="progress-container"><div class="progress-bar" style="width: ${(snipers/3)*100}%; background: var(--sniper-gold)"></div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Operational Turbo Fleet</div>
                    <div class="stat-value" style="color: var(--turbo-blue)">${turbos}/47</div>
                    <div class="progress-container"><div class="progress-bar" style="width: ${(turbos/47)*100}%"></div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Mission Win Rate</div>
                    <div class="stat-value">${winRate}%</div>
                    <div style="font-size: 12px; color: var(--text-dim); margin-top: 5px;">Success Vector Stability</div>
                </div>
            `;
        }

        function renderActive(data) {
            const grid = document.getElementById('activeGrid');
            if (data.length === 0) {
                grid.innerHTML = '<div class="loader">Fleet in Hangar. Waiting for Signal...</div>';
                return;
            }

            grid.innerHTML = data.map((h, i) => {
                const pnl = ((h.currentPrice - h.entryPrice) / h.entryPrice * 100);
                const isSniper = h.mode === 'Sniper';
                const age = Math.floor((Date.now() - new Date(h.entryTime).getTime()) / 60000);
                
                return `
                    <div class="token-card" style="animation-delay: ${i * 0.05}s">
                        <div class="mode-tag ${isSniper ? 'tag-sniper' : 'tag-turbo'}">${h.mode || 'Turbo'}</div>
                        <div class="token-header">
                            <div class="token-icon">${h.symbol[0]}</div>
                            <div class="token-info">
                                <h3>${h.symbol.replace('USDT', '')}</h3>
                                <p>Active for ${age}m • Density ${h.density || 0}%</p>
                            </div>
                        </div>
                        <div class="token-main">
                            <div class="price-current">$${h.currentPrice || h.entryPrice}</div>
                            <div class="pnl-badge ${pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}%</div>
                        </div>
                        <div class="metrics-row">
                            <div class="metric">
                                <div class="metric-label">Execution In</div>
                                <div class="metric-value">$${h.entryPrice}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Combat Load</div>
                                <div class="metric-value">$${h.capital || '0.00'}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderHistory(data) {
            const grid = document.getElementById('historyGrid');
            if (data.length === 0) {
                grid.innerHTML = '<div class="loader">Archiving Records...</div>';
                return;
            }

            grid.innerHTML = data.slice(-40).reverse().map((h, i) => {
                const pnl = h.pnl || 0;
                const isSniper = h.mode === 'Sniper';
                
                return `
                    <div class="token-card history-card" style="animation-delay: ${i * 0.03}s">
                        <div class="mode-tag ${isSniper ? 'tag-sniper' : 'tag-turbo'}">${h.mode || 'Turbo'}</div>
                        <div class="token-header">
                            <div class="token-icon" style="opacity: 0.5">${h.symbol[0]}</div>
                            <div class="token-info">
                                <h3>${h.symbol.replace('USDT', '')}</h3>
                                <p>Mission Decided • ${new Date(h.exitTime).toLocaleTimeString()}</p>
                            </div>
                        </div>
                        <div class="token-main">
                            <div class="price-current" style="color: var(--text-dim); font-size: 22px;">$${h.exitPrice}</div>
                            <div class="pnl-badge ${pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}%</div>
                        </div>
                        <div class="metrics-row">
                            <div class="metric">
                                <div class="metric-label">In Factor</div>
                                <div class="metric-value">$${h.entryPrice}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Out Factor</div>
                                <div class="metric-value">$${h.exitPrice}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        setInterval(updatePulse, 5000);
        updatePulse();
    </script>
</body>
</html>
