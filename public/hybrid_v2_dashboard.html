<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid V2 Dashboard — Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05070a;
            --card-bg: rgba(13, 17, 23, 0.8);
            --accent-gold: #ffb01f;
            --accent-blue: #0084ff;
            --success: #00ff95;
            --danger: #ff3e3e;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(0, 132, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(255, 176, 31, 0.05) 0%, transparent 50%);
            min-height: 100vh;
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .brand h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand span {
            color: var(--accent-gold);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .system-status {
            display: flex;
            gap: 20px;
        }

        .status-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
        }

        .stat-sub {
            font-size: 13px;
            margin-top: 5px;
            opacity: 0.7;
        }

        /* Fleet Section */
        .section-header {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-header h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .section-header .line {
            flex-grow: 1;
            height: 1px;
            background: var(--border);
        }

        .token-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .token-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .token-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .card-glow {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.03), transparent 70%);
            pointer-events: none;
        }

        .token-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .symbol-info h3 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .symbol-info p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .badge {
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-sniper {
            background: rgba(255, 176, 31, 0.1);
            color: var(--accent-gold);
        }

        .badge-turbo {
            background: rgba(0, 132, 255, 0.1);
            color: var(--accent-blue);
        }

        .token-pnl {
            margin: 25px 0;
            text-align: center;
        }

        .pnl-value {
            font-size: 42px;
            font-weight: 800;
        }

        .pnl-pos {
            color: var(--success);
        }

        .pnl-neg {
            color: var(--danger);
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .metric-box span {
            display: block;
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .metric-box b {
            font-size: 14px;
            font-weight: 600;
        }

        .loader {
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: var(--text-secondary);
        }

        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            body {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="brand">
            <span>Hybrid Engine V2</span>
            <h1>Command Center</h1>
        </div>
        <div class="system-status">
            <div class="status-item">
                <div class="dot"></div> Hub: Active
            </div>
            <div class="status-item" id="lastSeen">Last Sync: --:--:--</div>
        </div>
    </div>

    <div class="tabs" style="display: flex; gap: 15px; margin-bottom: 30px; justify-content: center;">
        <button class="tab-btn active" onclick="switchMode('solana')" id="btn-solana"
            style="background:#0d1117; border:1px solid #30363d; color:#8b949e; padding:10px 25px; border-radius:12px; cursor:pointer; font-weight:700;">SOLANA
            HYBRID</button>
        <button class="tab-btn" onclick="switchMode('futures')" id="btn-futures"
            style="background:#0d1117; border:1px solid #30363d; color:#8b949e; padding:10px 25px; border-radius:12px; cursor:pointer; font-weight:700;">FUTURES
            SNIPER</button>
    </div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <div class="stat-label">Realized Profit</div>
            <div class="stat-value" id="totalProfit">$0.00</div>
            <div class="stat-sub" id="tradeCount">0 Missions Completed</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Win Rate</div>
            <div class="stat-value" id="winRate">0%</div>
            <div class="stat-sub">Success Probability</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Active Slots</div>
            <div class="stat-value" id="slotsUsed">0/10</div>
            <div class="stat-sub">Fleet Capacity</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Volume</div>
            <div class="stat-value" id="totalVolume">$0.00</div>
            <div class="stat-sub">Allocated Capital</div>
        </div>
    </div>

    <div class="section-header">
        <h2>Active Fleet</h2>
        <div class="line"></div>
    </div>

    <div class="token-grid" id="tokenGrid">
        <div class="loader">Synchronizing units...</div>
    </div>

    <script>
        let currentMode = 'solana';

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.style.background = '#0d1117';
                b.style.color = '#8b949e';
                b.style.borderColor = '#30363d';
            });
            const activeBtn = document.getElementById(`btn-${mode}`);
            activeBtn.style.background = mode === 'solana' ? '#0084ff22' : '#ffb01f22';
            activeBtn.style.color = '#fff';
            activeBtn.style.borderColor = mode === 'solana' ? '#0084ff' : '#ffb01f';
 document.querySelector('.brand span').textContent = mode === 'solana' ? 'Hybrid Engine V2' : 'Futures Sniper V3';
            updateDashboard();
        }

        async function updateDashboard() {
            try {
                const endpoint = currentMode === 'solana' ? '/api/hunts' : '/api/hunts/futures';
                const port = window.location.port || '3000';
                const res = await fetch(`http://${window.location.hostname}:${port}${endpoint}`);
                const data = await res.json();

            closed;
                if (currentMode === 'solana') {
                    active = data.filter(h => h.status === 'active' && h.strategyId === 'vwap_hybrid');
                    closed = data.filter(h => h.status === 'closed' && h.strategyId === 'vwap_hybrid');
                } else {
                    // Futures data is already combined [hunts, history] from proxy
                    active = data.filter(h => h.status === 'active');
                    closed = data.filter(h => h.status === 'closed');
                }

                renderStats(active, closed);
                renderUnits(active);

                document.getElementById('lastSeen').textContent = `Last Sync: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                console.error('Connection Lost');
                document.getElementById('lastSeen').textContent = 'Server Offline';
            }
        }

        function renderStats(active, closed) {
            // Profit in USD (Capital * PnL%)
            const totalProfitUSD = closed.reduce((acc, h) => {
                const profit = h.capital * ((h.exitPrice - h.entryPrice) / h.entryPrice);
                return acc + profit;
            }, 0);

            const wins = closed.filter(h => h.exitPrice > h.entryPrice).length;
            const rate = closed.length > 0 ? Math.round((wins / closed.length) * 100) : 0;
            const totalVolume = active.reduce((acc, h) => acc + h.capital, 0);

            document.getElementById('totalProfit').textContent = `$${totalProfitUSD.toFixed(2)}`;
            document.getElementById('totalProfit').style.color = totalProfitUSD >= 0 ? 'var(--success)' : 'var(--danger)';
            document.getElementById('tradeCount').textContent = `${closed.length} Missions Completed`;
            document.getElementById('winRate').textContent = `${rate}%`;
            document.getElementById('slotsUsed').textContent = `${active.length}/10`;
            document.getElementById('totalVolume').textContent = `$${totalVolume.toFixed(2)}`;
        }

        function renderUnits(data) {
            const grid = document.getElementById('tokenGrid');
            if (data.length === 0) {
                grid.innerHTML = '<div class="loader">Hangar empty. Scanning top 200 markets...</div>';
                return;
            }

            grid.innerHTML = data.map(h => {
                const isLong = h.direction === 'LONG';
                const pnl = isLong 
                    ? ((h.currentPrice - h.entryPrice) / h.entryPrice) * 100
                    : ((h.entryPrice - h.currentPrice) / h.entryPrice) * 100;
                
                const isSniper = h.mode === 'Sniper' || h.mode === 'VWAP-BREAKOUT';
                const age = Math.floor((Date.now() - new Date(h.entryTime).getTime()) / 60000);

                return `
                    <div class="token-card">
                        <div class="card-glow"></div>
                        <div class="token-top">
                            <div class="symbol-info">
                                <h3 style="display:flex; align-items:center; gap:8px">
                                    ${h.symbol.replace('USDT', '')}
                                    <span style="font-size:12px; padding:2px 6px; border-radius:4px; background:${isLong ? 'rgba(0, 255, 149, 0.1)' : 'rgba(255, 62, 62, 0.1)'}; color:${isLong ? 'var(--success)' : 'var(--danger)'}; border:1px solid ${isLong ? 'rgba(0, 255, 149, 0.2)' : 'rgba(255, 62, 62, 0.2)'}">
                                        ${h.direction}
                                    </span>
                                </h3>
                                <p>Active for ${age}m • RSI ${h.rsi || '--'}</p>
                            </div>
                            <span class="badge ${isSniper ? 'badge-sniper' : 'badge-turbo'}">${h.mode || 'Turbo'}</span>
                        </div>
                        <div class="token-pnl">
                            <div class="pnl-value ${pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}%</div>
                            <p style="font-size: 13px; opacity: 0.6;">Current PnL</p>
                        </div>
                        <div class="metrics">
                            <div class="metric-box">
                                <span>Entry Factor</span>
                                <b>$${h.entryPrice >= 1 ? h.entryPrice.toFixed(4) : h.entryPrice.toFixed(8)}</b>
                            </div>
                            <div class="metric-box">
                                <span>Capital</span>
                                <b>$${h.capital.toFixed(2)} x${h.leverage || 1}</b>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        switchMode('solana');
        setInterval(updateDashboard, 5000);
    </script>
</body>

</html>
